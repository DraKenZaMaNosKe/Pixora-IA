name: pixora
description: "Pixora IA - Wallpapers, Ringtones & Icon Packs"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  just_audio: ^0.9.39
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  http: ^1.2.1
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  permission_handler: ^11.3.0
  flutter_cache_manager: ^3.3.2
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
